<!DOCTYPE html>
<head>
  <title>Тест про Minecraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<html lang="uk">
<body>

<div class="app-container">
    <div id="start-screen" class="screen">
<h2>Тест про Minecraft</h2>
<button id="start-btn">Почати</button>    
    </div>

    <div id="quiz-screen" class="screen hide">
       <div class="header">
    <span id="timer">Час: 15</span>
    <span id="score-display">Бали: 0</span>
</div>
        <h2 id="question-text">Питання</h2>
        <div id="answers-container">
        </div>
    </div>
<div id="result-screen" class="screen hide">
<h2>Тест завершено!</h2>
<p class="result-text"></p>
 <button id="restart-btn">Спробувати ще</button>

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
